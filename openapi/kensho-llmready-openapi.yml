    post:
      operationId: Get Segments
      description: "Get the templated segments of a given company_id for a given start_year, start_quarter, end_year and end_quarter.\n\
        \nSegments can be filtered on the segment_type for 'business' for Line of Business Segments or 'geographic' for Geographic\
        \ Segments.\n\nParameters:\ncompany_id (int, required): The company_id requested\nsegment_type (SegmentType): The\
        \ segment type to filter on, either “business” or “geographic”. Defaults to “business”.\nperiod_type (PeriodType):\
        \ The period_type requested for. Can be “annual”, “quarterly”, \"ytd\". Defaults to “annual” when start_quarter and\
        \ end_quarter are None.\nstart_year (int): The starting year\nstart_quarter (int): The starting quarter\nend_year\
        \ (int): The ending year\nend_quarter (int): The ending quarter\ncalendar_type (CalendarType): The type of calendar\
        \ lookup to use, either \"fiscal\" or \"calendar\". Defaults to \"fiscal\".\nnum_periods (int): Instead of using absolute\
        \ time lookup, you can look up segments by time relative to now. Defaults to 5 if no other time parameters are present.\n\
        num_periods_back (int): Instead of using absolute time lookup, you can look up segments by time relative to now. Defaults\
        \ to 0.\n\nReturns:\n    dict: A nested dictionary where the first-level keys are \"results\" and \"errors\".\n  \
        \  Within \"results\", there is one key per company ID, with a metadata value \"currency\" under that, and \"periods\"\
        \n    Within the \"periods\" dictionary,\n    - The first-level keys are strings representing the time period of either\
        \ calendar years or quarters (e.g., 'FY2024' for a fiscal year, or 'FY2024Q1', 'FY2024Q2' for fiscal quarters).\n\
        \    - Each period contains 'period_end_date', 'num_months', and a 'segments' array.\n    - Each segment in the array\
        \ has a 'name' (either line of business segment names specific to a company's organization or geographic segment like\
        \ 'Asia', 'United States', 'Rest of World') and 'line_items' array.\n    - Each line item in the array contains 'name'\
        \ (e.g., 'Revenue', 'Operating Income') and 'value' fields."
