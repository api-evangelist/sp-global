name: S&P Global Vocabulary
description: Operational and capability vocabulary spanning S&P Global Market Intelligence (Capital IQ), S&P Global
  Ratings, S&P Dow Jones Indices, S&P Global Commodity Insights (Platts), S&P Global Mobility, S&P Global Sustainable1,
  and the Kensho Technologies AI subsidiary that owns the public REST API surface.
url: https://raw.githubusercontent.com/api-evangelist/sp-global/refs/heads/main/vocabulary/sp-global-vocabulary.yml
created: '2026-05-23'
modified: '2026-05-23'

