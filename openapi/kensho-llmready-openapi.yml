      security:
      - cookieAuth: []
      - Kensho_JWT_Auth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsensusTargetPriceResponse'
              examples:
                ConsensusTargetPriceExample:
                  value:
                    results:
                      '24937':
                        currency: USD
                        effective_date: '2026-03-03'
