  - name: S&P Global Ratings
    description: Credit ratings and ratings research.
    url: https://www.spglobal.com/ratings
  - name: S&P Dow Jones Indices
    description: Equity, fixed-income, and commodity index data including the S&P 500 and Dow Jones Industrial Average.
    url: https://www.spglobal.com/spdji
  - name: S&P Global Sustainable1
    description: ESG scores, climate, and biodiversity datasets.
    url: https://www.spglobal.com/esg
  - name: S&P Global Mobility
    description: Automotive intelligence (formerly IHS Markit automotive) covering production, sales, and connected-vehicle
      data.
    url: https://www.spglobal.com/mobility
