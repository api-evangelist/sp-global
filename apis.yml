- type: Features
  data:
  - 5 public REST OpenAPI surfaces (LLM-ready, Extract, NERD, Scribe v1 batch, Scribe v2 batch)
  - 71 documented REST endpoints across the 5 specs (60 LLM-ready, 5 Extract, 3 NERD, 1 Scribe v1, 2 Scribe v2)
  - MCP server for the LLM-ready API with stdio, SSE, and streamable-http transports
  - Claude Cowork plugin shipping tearsheets, funding digests, and earnings preview skills
  - kensho-kfinance Python SDK on PyPI with LangChain/OpenAI/Anthropic/Gemini examples
  - OIDC authentication with keypair (production) or refresh token (development) flows
  - Distribution via Snowflake and Databricks marketplace shares in addition to direct REST
  - Capital IQ database back-end powering financial entity disambiguation across products
  - Real-time WebSocket transcription companion to the Scribe batch APIs
  - Grounding Agent (Alpha) for retrieval-with-citations over AI-ready datasets
  sources:
  - https://docs.kensho.com
  - https://docs.kensho.com/llmreadyapi/api
  - https://github.com/kensho-technologies/kfinance
  - https://github.com/kensho-technologies/spglobal-agent-skills
  updated: '2026-05-23'
- type: UseCases
  data:
  - name: AI Equity Research
    description: Ground LLM-generated investment notes, tearsheets, and earnings previews in live S&P Capital IQ data via
      the LLM-ready API and the S&P Global Claude Cowork plugin.
  - name: M&A and Funding Intelligence
    description: Pull merger, acquisition, advisor, and funding-round details for deal sourcing, target screening, and
      competitive intelligence.
  - name: Earnings and Estimates Workflows
    description: Retrieve consensus, estimates, calendar dates, and transcripts for earnings preview generation and post-call
      analysis.
  - name: Document Intelligence
    description: Convert PDF filings, decks, and research into structured JSON with Kensho Extract for downstream RAG and
      analytics pipelines.
  - name: Entity Linking for Financial Text
    description: Use Kensho NERD to disambiguate company and security mentions in news, filings, and chat to canonical
      Capital IQ IDs.
  - name: Earnings Call Transcription
    description: Transcribe finance and business audio with Kensho Scribe v2 batch and real-time APIs, including
      Human-in-the-Loop review for highest accuracy.
  - name: Grounded Conversational Analytics
    description: Build chatbots and analyst assistants that return cited answers from S&P Global datasets via the Grounding
      Agent.
- type: Integrations
  data:
  - name: Claude (Anthropic)
    description: First-class Claude Desktop, Claude Cowork, and Claude Code MCP integrations including the S&P Global Plugin.
  - name: ChatGPT (OpenAI)
    description: MCP connector documented under llmreadyapi/mcp/third-party/chatgpt; code-generation and function-calling
      notebooks for OpenAI models.
  - name: Microsoft Copilot Studio
    description: Documented MCP third-party integration path for enterprise Copilot deployments.
  - name: Amazon QuickSuite
    description: Documented MCP integration for AWS-hosted GenAI workflows.
  - name: Databricks
    description: MCP integration plus Databricks marketplace shares for AI-ready data distribution.
  - name: Mistral (Beta)
    description: MCP integration in beta for Mistral-hosted agents.
  - name: LangChain
    description: Function-calling notebooks under llm-ready-api-examples wrap kFinance tools as LangChain tools across
      OpenAI, Anthropic, and Google Gemini providers.
  - name: Snowflake Marketplace
    description: Distribution channel for S&P Global Marketplace datasets via Snowflake data sharing.
- type: Subsidiaries
  data:
  - name: Kensho Technologies
    description: S&P Global AI subsidiary that owns the public developer API surface (LLM-ready API, Extract, NERD, Scribe,
      Grounding) and the kensho-kfinance SDK.
    url: https://kensho.com
  - name: S&P Global Market Intelligence
    description: Capital IQ Pro, Marketplace, Compustat, RatingsXpress, Panjiva, 451 Research, and other data-intelligence
