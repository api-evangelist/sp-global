- aid: sp-global:kensho-llm-ready-api
  name: S&P Global LLM-Ready API (kFinance)
  description: REST API and Model Context Protocol server exposing S&P Capital IQ Financials, Market Data, Business Relationships,
    Earnings Call Transcripts, Company Intelligence, M&A Transactions, and Global Securities information to LLMs and agentic
    AI applications. Distributed via the kensho-kfinance Python library and an MCP server compatible with Claude, ChatGPT,
    Microsoft Copilot Studio, Amazon QuickSuite, Databricks, and Mistral. 60 documented REST endpoints across companies,
    securities, statements, estimates, transcripts, mergers, funding rounds, and identifier crosswalks.
  humanURL: https://docs.kensho.com/llmreadyapi
