          pattern: ^-?\d{0,30}(?:\.\d{0,8})?$
        use_of_proceeds:
          type: string
        pre_deal_situation:
          type: string
        redemption:
          type: string
        cumulative_dividends:
          type: string
        reorganization:
          type: string
        pay_to_play:
          type: string
        pay_to_play_penalties:
          type: string
    RoundsOfFunding:
      type: object
      properties:
        rounds_of_funding:
          type: array
          items:
            $ref: '#/components/schemas/RoundOfFunding'
      required:
      - rounds_of_funding
    SecuritiesListResponse:
      type: object
      description: Response fields for get_securities
      properties:
        securities:
          type: array
          items:
            type: integer
            title: security_id
      required:
      - securities
    SegmentTypeEnum:
      enum:
      - business
      - geographic
      type: string
      description: '* `business` - business

        * `geographic` - geographic'
    SegmentsCurrencyResponse:
      type: object
      properties:
        currency:
          type: string
          nullable: true
        periods:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Period'
      required:
      - currency
      - periods
    SegmentsRequest:
      type: object
      description: Request fields for post_segments
      properties:
        segment_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SegmentTypeEnum'
          - $ref: '#/components/schemas/NullEnum'
        period_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/PeriodTypeBe5Enum'
          - $ref: '#/components/schemas/NullEnum'
        company_ids:
          type: array
          items:
            type: integer
          minItems: 1
        start_year:
          type: integer
          maximum: 9999
          minimum: 1000
          nullable: true
        end_year:
          type: integer
          maximum: 9999
          minimum: 1000
          nullable: true
        start_quarter:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/StartQuarterEnum'
          - $ref: '#/components/schemas/NullEnum'
        end_quarter:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EndQuarterEnum'
          - $ref: '#/components/schemas/NullEnum'
        calendar_type:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CalendarTypeEnum'
          - $ref: '#/components/schemas/NullEnum'
        num_periods:
          type: integer
          maximum: 99
          minimum: 1
          nullable: true
        num_periods_back:
          type: integer
          maximum: 99
          minimum: 0
          nullable: true
      required:
      - company_ids
    SegmentsResponse:
      type: object
      properties:
        results:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SegmentsCurrencyResponse'
        errors:
          type: object
          additionalProperties:
            type: string
            title: error
      required:
      - errors
      - results
    StartQuarterEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      type: integer
      description: '* `1` - 1

        * `2` - 2

        * `3` - 3

        * `4` - 4'
    StatementTypeEnum:
      enum:
      - balance_sheet
      - bs
      - cash_flow
      - cashflow
      - cf
      - income_statement
      - income_stmt
      - is
      type: string
      description: '* `balance_sheet` - balance_sheet

        * `bs` - bs

        * `cash_flow` - cash_flow

        * `cashflow` - cashflow

        * `cf` - cf

        * `income_statement` - income_statement

        * `income_stmt` - income_stmt

        * `is` - is'
    TickerListResponse:
      type: object
      description: Response fields for get_tickers_by_simple_industry
      properties:
        tickers:
          type: array
          items:
            $ref: '#/components/schemas/IdentificationTripleResponse'
      required:
      - tickers
    TickerRelationshipResponse:
      type: object
      description: Response fields for get_relationships
      properties:
        current:
          type: array
          items:
            $ref: '#/components/schemas/IdentificationTripleResponse'
        previous:
          type: array
          items:
            $ref: '#/components/schemas/IdentificationTripleResponse'
      required:
      - current
      - previous
    TradingItemListResponse:
      type: object
      description: Response fields for get_trading_item_by_exchange_code, get_trading_items
      properties:
        trading_items:
          type: array
          items:
            type: integer
            title: trading_item_id
      required:
      - trading_items
    TransactionInfoParticipant:
      type: object
      properties:
        company_id:
          type: integer
        company_name:
          type: string
      required:
      - company_id
      - company_name
    TranscriptEntry:
      type: object
      description: Serializer for individual transcript entries.
      properties:
        component_type:
          type: string
        person_name:
          type: string
          maxLength: 255
        text:
          type: string
          maxLength: 255
      required:
      - component_type
      - person_name
      - text
    TranscriptResponse:
      type: object
      description: Response fields for get_transcript.
      properties:
        transcript:
          type: array
          items:
            $ref: '#/components/schemas/TranscriptEntry'
      required:
      - transcript
    UnifiedIdentificationTripleRequest:
      type: object
      description: Request fields for unified_identification_triple
      properties:
        identifiers:
          type: array
          items:
            type: string
            maxLength: 255
          description: List of identifiers to resolve (can include ISINs, CUSIPs, company names, company IDs, tickers, or
            company names)
          maxItems: 100
          minItems: 1
      required:
      - identifiers
    UnifiedIdentificationTripleResponse:
      type: object
      description: 'Response fields for unified_identification_triple.


        Maps identifiers to either identification triples or error messages.'
      properties:
        data:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/IdentificationTripleWithCompanyInfoOrError'
          readOnly: true
      required:
      - data
  securitySchemes:
    Kensho_JWT_Auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
servers:
- url: https://kfinance.kensho.com
