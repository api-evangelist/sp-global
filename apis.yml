- aid: sp-global:kensho-scribe-realtime-api
  name: Kensho Scribe Real Time API
  description: Real-time streaming transcription over a WebSocket at wss://scribe.kensho.com/ws. Clients send an Authenticate
    message with a Kensho OIDC access token, then StartTranscription with an audio_format (RAW pcm_s16le, 16 kHz, mono),
    followed by base64-encoded AddData chunks of at most 15 seconds each carrying monotonically increasing sequence_numbers,
    and finally EndOfStream. The server streams TranscriptionStarted, DataAdded, AddTranscript, EndOfTranscript, and Error
    messages back over the same socket. This is the only public WebSocket surface S&P Global exposes — Capital IQ Pro,
    Marketplace, and other market-data feeds are delivered via REST, file/SFTP, Snowflake share, and Databricks share.
  humanURL: https://docs.kensho.com/scribe/v2/developer-guide
  baseURL: wss://scribe.kensho.com/ws
  tags:
  - Speech to Text
  - Transcription
  - WebSocket
  - Streaming
  - Real Time
  - AsyncAPI
